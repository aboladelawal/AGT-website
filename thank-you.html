<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enquiry received — Alpha Global Tech &amp; Consulting</title>
<link rel="icon" type="image/png" href="images/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,500&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0c0e12; --line-soft: #1d222c; --line: #262c36;
    --bone: #f3f2ee; --text: #e8e8e6; --text-2: #8e93a0;
    --teal: #3aa3a0; --teal-lo: #2b6f6e;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--sans); background: var(--ink); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased; padding: 32px; overflow: hidden;
  }
  .grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: 76px 76px;
    -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 42%, #000 0%, transparent 78%);
            mask-image: radial-gradient(ellipse 60% 60% at 50% 42%, #000 0%, transparent 78%);
    opacity: .5;
  }
  .box { position: relative; z-index: 2; text-align: center; max-width: 460px; }
  .check {
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid var(--teal-lo); background: rgba(58,163,160,.08);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 30px;
  }
  .tag {
    font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--teal); margin-bottom: 18px;
  }
  h1 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(34px, 6vw, 52px); line-height: 1.05;
    letter-spacing: -0.03em; margin-bottom: 18px;
  }
  h1 em { font-style: italic; font-weight: 500; color: var(--teal); }
  p {
    font-size: 15.5px; color: var(--text-2); font-weight: 300;
    line-height: 1.62; margin-bottom: 32px;
  }
  .home {
    font-family: var(--sans); font-size: 14px; font-weight: 500;
    text-decoration: none; color: var(--ink); background: var(--bone);
    padding: 14px 26px; border-radius: 8px;
    display: inline-flex; align-items: center; gap: 9px;
    transition: transform .2s, background .2s;
  }
  .home:hover { transform: translateY(-2px); background: var(--teal); }
  .home svg { transition: transform .25s; }
  .home:hover svg { transform: translateX(-3px); }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="box">
    <div class="check">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 12.5 10 17.5 19 7" stroke="#3aa3a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="tag">Enquiry received</div>
    <h1>Thank you. We will <em>be in touch</em>.</h1>
    <p>
      Your enquiry has reached us. We reply within two working days,
      usually sooner.
    </p>
    <a href="/" class="home">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13 8H4M7.5 3.5 3 8l4.5 4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to homepage
    </a>
  </div>
</body>
</html>
